apiVersion: apps/v1
kind: Deployment
metadata:
  name: raglens-backend
  namespace: raglens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raglens-backend
  template:
    metadata:
      labels:
        app: raglens-backend
    spec:
      containers:
        - name: backend
          image: souravsrinivas2912/raglens-backend:latest
          ports:
            - containerPort: 8003
          env:
            - name: ENV
              value: production
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5


