apiVersion: apps/v1
kind: Deployment
metadata:
  name: raglens-backend
  namespace: raglens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raglens-backend
  template:
    metadata:
      labels:
        app: raglens-backend
    spec:
      containers:
        - name: backend
          image: souravsrinivas2912/raglens-backend:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chromadb-storage
              mountPath: /app/raglens-chroma-db
            - name: generated-images
              mountPath: /app/generated-images
          env:
            - name: ENV
              value: production
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
      volumes:
        - name: chromadb-storage
          persistentVolumeClaim:
            claimName: raglens-chromadb-pvc
        - name: generated-images
          persistentVolumeClaim:
            claimName: raglens-images-pvc
