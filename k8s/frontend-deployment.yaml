apiVersion: apps/v1
kind: Deployment
metadata:
  name: raglens-frontend
  namespace: raglens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raglens-frontend
  template:
    metadata:
      labels:
        app: raglens-frontend
    spec:
      containers:
        - name: frontend
          image: souravsrinivas2912/raglens-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"


