apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
 
metadata:
  name: raglens-cluster
  region: us-east-1
  version: "1.35"
 
managedNodeGroups:
  - name: raglens-ng
    instanceType: t3.small
    minSize: 2
    maxSize: 4
    desiredCapacity: 2
    volumeSize: 20
    iam:
      withAddonPolicies:
        albIngress: true
        cloudWatch: true
 
addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
 
iam:
  withOIDC: true


